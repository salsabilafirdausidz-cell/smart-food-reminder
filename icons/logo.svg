<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#20804A"/>
      <stop offset="1" stop-color="#0C3B21"/>
    </linearGradient>
  </defs>
  <!-- App tile -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Clock dial: open arc around the leaf -->
  <circle cx="256" cy="262" r="170" fill="none"
          stroke="rgba(255,255,255,0.30)" stroke-width="16"
          stroke-linecap="round"
          stroke-dasharray="828 240"
          transform="rotate(-35 256 262)"/>

  <!-- Amber marker: the "reminder" tick at the arc opening -->
  <circle cx="382" cy="147" r="19" fill="#F4A61D"/>

  <!-- Leaf -->
  <path d="M256 116
           C 344 168 356 272 258 356
           C 172 272 176 170 256 116 Z"
        fill="#FFFFFF"/>

  <!-- Main vein -->
  <path d="M257 162 L257 332"
        stroke="#15613A" stroke-width="13" stroke-linecap="round" fill="none"/>
  <!-- Side veins -->
  <path d="M257 232 C 234 226 218 210 210 190"
        stroke="#15613A" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M257 272 C 282 266 298 250 306 230"
        stroke="#15613A" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
